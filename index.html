<!doctype html>
<html lang="en">
  <head>
    <script>
    // --- GOD OF SCRIPT NETWORK INTERCEPTOR ---
    const OG_Fetch = window.fetch;
    window.fetch = async function () {
        let url = arguments[0];
        if (typeof url === 'string' && url.includes('generativelanguage.googleapis.com')) {
            const urlObj = new URL(url);
            // Handle Gemini 3.1 specific mapping (needs v1alpha)
            const apiVersion = url.includes('3.1') ? 'v1alpha' : 'v1beta';
            
            // Rewrite local hit to Cloudflare Gateway versioned route
            const path = urlObj.pathname.replace(/^\/(v1|v1beta|v1alpha)\//, '');
            arguments[0] = $scriptUrl/ + apiVersion + /gemini/ + path;
        }
        return OG_Fetch.apply(this, arguments);
    };
    </script>
